<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Draw - Nazimen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #d4af37; --gold-glow: rgba(212, 175, 55, 0.7); --bg: #050505; }
        
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; user-select: none; -webkit-user-select: none; min-height: 100vh; }
        
        .header { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; font-size: 0.9rem; border-bottom: 1px solid rgba(212, 175, 55, 0.2); box-sizing: border-box; background: #000; z-index: 100; position: sticky; top: 0; }
        .id-val { color: var(--gold); font-weight: 900; }
        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        
        .section-title { font-weight: 900; font-size: 1.2rem; color: var(--gold); text-transform: uppercase; margin: 15px 0 20px 0; text-align: center; line-height: 1.3; }
        
        /* Стандартты тор */
        .prize-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; margin-bottom: 20px; }
        .prize-card { background: #111; border: 1px solid rgba(212, 175, 55, 0.5); border-radius: 10px; padding: 8px 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90px; text-align: center; position: relative; }
        .prize-img { width: 80%; height: 45px; object-fit: contain; }
        
        .main-tag { position: absolute; top: -8px; background: var(--gold); color: #000; padding: 2px 5px; border-radius: 8px; font-size: 0.45rem; font-weight: 900; white-space: nowrap; z-index: 5; text-transform: uppercase; }
        .prize-name { font-size: 0.5rem; font-weight: 700; margin-top: 6px; color: #fff; text-transform: uppercase; }
        
        .chests-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; margin-top: 10px; }
        .chest-card { cursor: pointer; transition: transform 0.2s; }
        .chest-card:active { transform: scale(0.95); }
        .chest-img { width: 100%; filter: drop-shadow(0 0 5px var(--gold-glow)); }
        
        .open-btn { background: linear-gradient(45deg, #bf953f, #fcf6ba, #bf953f); color: #000; border: none; padding: 16px; border-radius: 30px; font-size: 1rem; font-weight: 900; width: 100%; margin-top: 15px; cursor: pointer; }
        .open-btn:active { transform: scale(0.95); }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.98); display:none; align-items:center; justify-content:center; z-index:2000; }
        .modal-box { background: #0a0a0a; border: 2px solid var(--gold); border-radius: 20px; width: 85%; padding: 30px 20px; text-align: center; }
        .res-img { width: 160px; height: 130px; object-fit: contain; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <div>ID: <span class="id-val" id="userIdDisp">...</span></div>
        <div style="color: #25d366; font-weight: 900;">LIVE 🟢</div>
    </div>
    
    <div class="container" id="mainView">
        <div class="section-title">NAZIMEN КОБДИШАСЫНАН<br> СЫЙЛЫҒЫҢЫЗДЫ АЛЫҢЫЗ</div>
        
        <div class="prize-grid">
            <div class="prize-card"><img src="money.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">50 000 ₸</div></div>
            <div class="prize-card"><img src="dyson.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Dyson</div></div>
            <div class="prize-card"><img src="sumka.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Сөмке</div></div>
            <div class="prize-card"><img src="Satuar.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Сотуар</div></div>
            
            <div class="prize-card"><img src="golden (1).png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Алтын</div></div>
            
            <div class="prize-card">
                <div class="main-tag">🏆 Басты сыйлық</div>
                <img src="elantra.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Elantra</div>
            </div>
            
            <div class="prize-card"><img src="syrga.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Күміс сырға</div></div>
            <div class="prize-card"><img src="parfum.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Парфюм</div></div>
            
            <div class="prize-card"><img src="cosmitic.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Косметика</div></div>
            <div class="prize-card"><img src="cushion.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Кушон</div></div>
            <div class="prize-card"><img src="bag.png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Косметичка</div></div>
            
            <div class="prize-card">
                <div class="main-tag">🏆 Басты сыйлық</div>
                <img src="china (1).png" class="prize-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"><div class="prize-name">Бизнес тур</div>
            </div>
        </div>
        <button class="open-btn" onclick="goToChests()">🎁 СЫЙЛЫҒЫМДЫ АШУ</button>
    </div>

    <div class="container" id="chestView" style="display:none;">
        <div class="section-title">Қобдишаны таңдаңыз</div>
        <div class="chests-grid">
            <script>
                for(let i=0; i<12; i++) { 
                    document.write(`<div class="chest-card" onclick="revealPrize()"><img src="chest.png" class="chest-img" loading="lazy" onerror="this.src='https://placehold.co/100/000/d4af37?text=?'"></div>`); 
                }
            </script>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-box">
            <h2 style="color:var(--gold); margin-bottom:5px;">ҚҰТТЫҚТАЙМЫЗ!</h2>
            <p style="color:#888; font-size:0.8rem;">Сіздің ұтысыңыз:</p>
            <div id="prizeResult"></div>
            <button onclick="closeApp()" style="background:var(--gold); color:#000; border:none; padding:15px; width:100%; border-radius:30px; font-weight:900; margin-top:20px; cursor:pointer;">БОТҚА ОРАЛУ</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; 
        };

        const tg = window.Telegram.WebApp; 
        tg.expand();
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id') || "БЕЛГІСІЗ";
        const attemptId = urlParams.get('attempt') || "test_000"; 
        
        // ҚОРҒАНЫС: Егер ботсыз кірсе, "Косметичка" шығады (Құпия сыйлық емес)
        let prizeFromBot = urlParams.get('prize');
        if (!prizeFromBot) {
            prizeFromBot = "Косметичка";
        }
        
        document.getElementById('userIdDisp').innerText = userId;
        
        function goToChests() {
            if(localStorage.getItem('opened_' + attemptId)) {
                alert('❌ Сіз бұл сыйлықты ашып қойғансыз!');
                tg.close();
                return;
            }
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('chestView').style.display = 'flex';
        }
        
        function revealPrize() {
            localStorage.setItem('opened_' + attemptId, 'true'); 
            
            const prizeImgs = { 
                "50 000 ₸": "money.png",
                "Dyson": "dyson.png",
                "Сөмке": "sumka.png",
                "Сотуар": "Satuar.png",
                "Алтын": "golden (1).png",
                "Elantra": "elantra.png",
                "Күміс сырға": "syrga.png",
                "Парфюм": "parfum.png",
                "Косметика": "cosmitic.png",
                "Кушон": "cushion.png",
                "Косметичка": "bag.png",
                "Бизнес тур": "china (1).png"
            };
            
            const img = prizeImgs[prizeFromBot] || "bag.png"; 
            document.getElementById('prizeResult').innerHTML = `<img src="${img}" class="res-img" onerror="this.src='https://placehold.co/160/000/d4af37?text=?'"><h3 style="font-size:1.3rem; margin:0; color:#fff;">${prizeFromBot}</h3>`;
            document.getElementById('winModal').style.display = 'flex';
            
            // Шашуды сәл азайттым (телефон қатпас үшін)
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, zIndex: 3000 });
        }

        function closeApp() {
            try { tg.sendData("update_tickets"); } catch(e) {}
            tg.close();
        }
    </script>
</body>
</html>
